<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{ page.title | default: site.name }}</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Ibm+Plex+Serif:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class", 
            theme: {
                extend: {
                    colors: {
                        surface: "#131316", background: "#131316", "surface-container-lowest": "#0e0e11",
                        "surface-container-high": "#2a2a2d", "on-background": "#e4e1e6", "on-surface": "#e4e1e6",
                        "on-surface-variant": "#c7c6ca", "outline-variant": "#46464a", 
                        primary: "#c8c6c8", secondary: "#ffb59d", "tertiary-fixed": "#e2e2e3"
                    }, 
                    fontFamily: {
                        "body-md": ["Ibm Plex Serif", "serif"], 
                        display: ["Geist", "sans-serif"], 
                        "label-mono": ["Geist Mono", "monospace"], 
                        headline: ["Geist", "sans-serif"]
                    }
                }
            }
        };
    </script>
    
    <style>
      :root { --mouse-x: -1000px; --mouse-y: -1000px; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #131316; }
      ::-webkit-scrollbar-thumb { background: #353438; }

      /* Fundo de pontos interativo */
      .dot-bg-base { background-image: radial-gradient(#4c4546 1.5px, transparent 1.5px); background-size: 24px 24px; opacity: 0.4; }
      .dot-bg-highlight { background-image: radial-gradient(#e2e2e2 1.5px, transparent 1.5px); background-size: 24px 24px; -webkit-mask-image: radial-gradient(circle 250px at var(--mouse-x) var(--mouse-y), black 0%, transparent 100%); mask-image: radial-gradient(circle 250px at var(--mouse-x) var(--mouse-y), black 0%, transparent 100%); }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen antialiased selection:bg-primary selection:text-on-primary">
    
    <!-- Background Fixo -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="dot-bg-base absolute inset-0"></div>
        <div class="dot-bg-highlight absolute inset-0"></div>
    </div>

    <!-- Navegação Superior -->
    <nav class="fixed top-0 left-0 w-full h-[76px] px-6 md:px-12 z-40 flex justify-between items-center backdrop-blur-md border-b border-outline-variant/30 bg-background/80">
        <a href="{{ site.baseurl }}/" class="font-headline font-bold text-2xl text-on-background hover:text-primary transition-colors">
            sobre<span class="text-primary">.</span>
        </a>
        <button id="menu-toggle" class="group flex items-center gap-3 text-on-background hover:text-primary transition-colors">
            <span class="font-label-mono text-sm uppercase tracking-widest hidden md:block">Menu</span>
            <span class="material-symbols-outlined text-2xl group-hover:rotate-90 transition-transform duration-300">menu</span>
        </button>
    </nav>

    <!-- Menu Hambúrguer (Duas Colunas, sem Contato) -->
    <div id="full-menu" class="fixed inset-0 bg-surface-container-lowest/95 backdrop-blur-xl z-[100] transition-transform duration-500 translate-x-full flex flex-col md:flex-row">
        <button id="close-menu" class="absolute top-6 right-6 md:right-12 text-on-background hover:text-primary transition-colors group p-2 z-50">
             <span class="material-symbols-outlined text-3xl group-hover:rotate-90 transition-transform duration-300">close</span>
        </button>
        
        <!-- Esquerda: Logo e Infos -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full p-8 md:p-24 flex flex-col justify-center border-b md:border-b-0 md:border-r border-outline-variant/30">
            <div class="flex flex-col items-start max-w-lg">
                <a href="{{ site.baseurl }}/" class="font-headline font-bold text-[64px] md:text-[120px] leading-none text-primary hover:opacity-80 transition-opacity">sobre.</a>
                <p class="font-label-mono text-on-surface-variant mt-6 uppercase tracking-widest text-xs md:text-sm">Editorial Technical Blog</p>
                <div class="text-xs text-on-surface-variant font-label-mono flex flex-col gap-4 mt-12 md:mt-24">
                    <p>© 2026 Editorial Technical Blog.</p>
                </div>
            </div>
        </div>

        <!-- Direita: Links -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full p-8 md:p-24 flex flex-col justify-center">
            <ul class="flex flex-col gap-6 md:gap-12 font-display text-4xl md:text-7xl font-bold tracking-tight">
                <li><a href="{{ site.baseurl }}/" class="menu-link block hover:text-primary hover:translate-x-4 transition-all duration-300">Início</a></li>
                <li><a href="{{ site.baseurl }}/autores.html" class="menu-link block hover:text-primary hover:translate-x-4 transition-all duration-300">Autores</a></li>
                <li><a href="{{ site.baseurl }}/manifesto.html" class="menu-link block hover:text-primary hover:translate-x-4 transition-all duration-300">Manifesto</a></li>
            </ul>
        </div>
    </div>

    <!-- O CONTEÚDO DAS PÁGINAS É INJETADO AQUI -->
    {{ content }}

    <script>
        // Efeito do mouse no background
        document.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
            document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        // Lógica do Menu
        const fullMenu = document.getElementById('full-menu');
        const menuToggle = document.getElementById('menu-toggle');
        const closeMenu = document.getElementById('close-menu');
        menuToggle.addEventListener('click', () => fullMenu.classList.remove('translate-x-full'));
        closeMenu.addEventListener('click', () => fullMenu.classList.add('translate-x-full'));
    </script>
</body>
</html>
